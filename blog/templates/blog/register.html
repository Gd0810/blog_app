{% extends 'blog/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="container mx-auto py-12 px-4">
    <div class="max-w-md mx-auto bg-gray-800 rounded-lg p-8 shadow-lg">
        <h2 class="text-2xl font-bold text-white text-center mb-6">Register</h2>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-gray-300 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-sm mt-1">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full px-4 py-3 bg-blue-600 text-white rounded-md hover:bg-blue-500 transition-colors duration-300">Register</button>
        </form>
        <p class="text-gray-400 text-center mt-4">Already have an account? <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-300">Login here</a></p>
    </div>
</section>
{% endblock %}
